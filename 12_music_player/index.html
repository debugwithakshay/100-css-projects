<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Music Player</title>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="disk"></div>

        <div class="song-desc">
          <h1 class="song">Salt in the Sea</h1>
          <p class="artist">Shantanu Pandit</p>
        </div>

        <div class="control-box">
          <span class="material-symbols-rounded repeat--icon"> repeat </span>
          <span class="material-symbols-rounded like--icon"> favorite </span>
          <span class="material-symbols-rounded speaker--icon"> speaker </span>
        </div>

        <div class="duration-box">
          <span>00:56</span>
          <div class="progress-total"></div>
          <span>03:54</span>
        </div>

        <span class="material-symbols-rounded pause--icon"> pause </span>
      </div>
    </main>
  </body>
</html>
