<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Newsletter card</title>
  </head>
  <body>
    <div class="card">
      <!-- card heading -->
      <h1 class="primary-heading">Sign up for Newsletters</h1>

      <!-- card content -->
      <div class="card-main">
        <div class="newsletter-item">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <div>
            <label for="checkbox">Daily Bits</label>
            <span>Today's biggest news</span>
          </div>
        </div>

        <div class="newsletter-item">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <div>
            <label for="checkbox">The Exchange</label>
            <span>Arts, money & markets</span>
          </div>
        </div>

        <div class="newsletter-item">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <div>
            <label for="checkbox">Sponsorship</label>
            <span>Partnership insight</span>
          </div>
        </div>
      </div>

      <!-- card content -->
      <div class="card-main">
        <div class="newsletter-item">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <div>
            <label for="checkbox">Week in Review</label>
            <span>The week's biggest news</span>
          </div>
        </div>

        <div class="newsletter-item">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <div>
            <label for="checkbox">Events Updates</label>
            <span>Announcements & Discount</span>
          </div>
        </div>

        <div class="newsletter-item">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <div>
            <label for="checkbox">This Week in Art</label>
            <span>Today's biggest news</span>
          </div>
        </div>
      </div>

      <div class="email-box">
        <input type="email" name="input" id="input" placeholder="Enter your email Address">
        <button>Subscribe</button>
      </div>
    </div>
  </body>
</html>
