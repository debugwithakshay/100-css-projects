<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="debugwithakshay" />
    <meta name="keywords" content="blog, blog card, blog card preview" />
    <meta name="description" content="This is the blog preview site" />
    <meta name="robots" content="index, follow" />
    <title>Blog Preview Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- blog card -->
      <div class="card">
        <img
          src="assets/images/illustration-article.svg"
          alt="blog thumbnail"
          class="blog__thumbnail"
        />
        <span class="blog__tag">Learning</span>
        <span class="published__date">Published 21 Dec 2023</span>
        <h1 class="blog__heading">HTML & CSS foundation</h1>
        <p class="blog__description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="about__author">
          <img src="assets/images/image-avatar.webp" alt="author image" class="author--img">
          <span class="author--name">Greg Hooper</span>
        </div>
      </div>
      <!-- blog card ended -->
    </main>
  </body>
</html>
