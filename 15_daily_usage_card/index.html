<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Daily Usage Card</title>
  </head>
  <body>
    <div class="card">
      <header>
        <span class="material-symbols-rounded icon-power"> bolt </span>
        <div class="header-about">
          <h1>AI Power Analytics</h1>
          <p>Daily Usage</p>
        </div>
        <span class="material-symbols-rounded icon-open"> north_east </span>
      </header>

      <div class="usage-items-box">
        <!-- item 1 -->
        <div class="usage-item">
          <span class="material-symbols-rounded icon-usage"> mode_fan </span>
          <div class="about-usage-item">
            <span class="usage-name">Air Conditioner</span>
            <div class="electric-data-box">
              <span>2unit</span>
              <div class="seprator"></div>
              <span>18KWh</span>
            </div>
          </div>
          <span class="material-symbols-rounded icon-right">
            chevron_right
          </span>
        </div>
        <!-- item2 -->
        <div class="usage-item">
          <span class="material-symbols-rounded icon-usage"> router </span>
          <div class="about-usage-item">
            <span class="usage-name">Wifi Router</span>
            <div class="electric-data-box">
              <span>1unit</span>
              <div class="seprator"></div>
              <span>8KWh</span>
            </div>
          </div>
          <span class="material-symbols-rounded icon-right">
            chevron_right
          </span>
        </div>
        <!-- item3 -->
        <div class="usage-item">
          <span class="material-symbols-rounded icon-usage">
            tv
            </span>
          <div class="about-usage-item">
            <span class="usage-name">Smart TV</span>
            <div class="electric-data-box">
              <span>2unit</span>
              <div class="seprator"></div>
              <span>12KWh</span>
            </div>
          </div>
          <span class="material-symbols-rounded icon-right">
            chevron_right
          </span>
        </div>
        <!-- item4 -->
        <div class="usage-item">
          <span class="material-symbols-rounded icon-usage">
            dew_point
            </span>
          <div class="about-usage-item">
            <span class="usage-name">Humidifier</span>
            <div class="electric-data-box">
              <span>1unit</span>
              <div class="seprator"></div>
              <span>2KWh</span>
            </div>
          </div>
          <span class="material-symbols-rounded icon-right">
            chevron_right
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
