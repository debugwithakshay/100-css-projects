<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="debugwithakshay" />
    <meta name="keywords" content="login, login page, signup" />
    <meta name="description" content="This is login apge" />
    <title>Login | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>

        <!-- card -->
      <div class="card">
        <h1 class="heading--primary">Login</h1>

        <input
          type="text"
          name="username"
          id="username"
          required="true"
          placeholder="Username"
        />

        <input
          type="password"
          name="password"
          id="username"
          required="true"
          placeholder="Password"
        />

        <div class="extra__section">
          <div>
            <input type="checkbox" name="remember" id="remember" />
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        <a href="#" class="loginBtn">Login</a>

        <div class="register__box">
          <span>Don't have an account?<a href="#">Register</a></span>
        </div>
      </div>
      <!-- card ended -->
    </main>
  </body>
</html>
