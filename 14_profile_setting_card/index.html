<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <title>Product Setting Card</title>
  </head>
  <body>
    <div class="card">
      <div class="profile-section">
        <div class="user-image"></div>
        <div class="user-data">
          <span class="user-name">Jackson low</span>
          <span class="user-email">hello@jackson.com</span>
        </div>
      </div>

      <div class="setting-items-box">
        <div class="setting-item">
          <span class="material-symbols-rounded"> tune </span>
          <span class="item-name">Account Setting</span>
        </div>

        <div class="setting-item">
          <span class="material-symbols-rounded"> dark_mode </span>
          <div class="toggle"></div>
          <span class="item-name">Dark Mode</span>
        </div>

        <div class="setting-item">
          <span class="material-symbols-rounded"> folder_managed </span>
          <span class="item-name">Invoice Manager</span>
        </div>

        <div class="setting-item">
          <span class="material-symbols-rounded"> logout </span>
          <span class="item-name">Logout</span>
        </div>
      </div>
    </div>
  </body>
</html>
