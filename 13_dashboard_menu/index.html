<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Dashboard Menu</title>
  </head>
  <body>
    <nav class="navigation">
      <div class="logo-box">
        <span class="material-symbols-rounded logo--img"> shopping_bag </span>
        <h1 class="logo--name">Shopping</h1>
      </div>

      <div class="user-box">
        <div class="user-thumbnail"></div>
        <div class="user-about">
          <span class="user-name">Alezander Hipp</span>
          <span class="user-role">Frontend Developer</span>
        </div>
      </div>

      <div class="dashboard-items-box">
        <!-- item1 -->
        <div class="dashboard-item selected">
          <span class="material-symbols-rounded icon--dashboard">
            widgets
          </span>
          <span class="dashboard-item--name">Dashboard</span>
          <div class="selected-tab"></div>
        </div>

        <!-- item2 -->
        <div class="dashboard-item non-selected">
          <span class="material-symbols-rounded"> shopping_cart </span>
          <span class="dashboard-item--name">Product</span>
          <div class="selected-tab"></div>
        </div>


        <!-- item3 -->
        <div class="dashboard-item non-selected">
          <span class="material-symbols-rounded">
            tune
            </span>
          <span class="dashboard-item--name">Categories</span>
          <div class="selected-tab"></div>
        </div>

        <!-- item 4 -->
        <div class="dashboard-item non-selected">
          <span class="material-symbols-rounded">
            explore
            </span>
          <span class="dashboard-item--name">Location</span>
          <div class="selected-tab"></div>
        </div>

        <!-- item 4 -->
        <div class="dashboard-item non-selected">
          <span class="material-symbols-rounded">
            support_agent
            </span>
          <span class="dashboard-item--name">Support</span>
          <div class="selected-tab"></div>
        </div>

        <!-- item 4 -->
        <div class="dashboard-item non-selected">
          <span class="material-symbols-rounded">
            settings
            </span>
          <span class="dashboard-item--name">Setting</span>
          <div class="selected-tab"></div>
        </div>

        <!-- item 4 -->
        <div class="dashboard-item non-selected">
          <span class="material-symbols-rounded">
            logout
            </span>
          <span class="dashboard-item--name">Logout</span>
          <div class="selected-tab"></div>
        </div>
      </div>
    </nav>
  </body>
</html>
