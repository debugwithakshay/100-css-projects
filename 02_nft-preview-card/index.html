<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="debugwithakshay" />
    <meta name="keywords" content="eth, btc, eth card" />
    <meta name="description" content="This is eth card" />
    <title>NFT Card Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- nft card -->
      <div class="card">
        <div class="nft-mage__box">
          <img
            src="images/image-equilibrium.jpg"
            alt="nft image"
            class="nft__image"
          />
          <div class="nft__image--blanket">
            <img src="images/icon-view.svg" alt="icon-view" class="icon--view">
          </div>
        </div>

        <h1 class="nft__heading">Equilibrium &nbsp;#3429</h1>
        <p class="nft__description">
          Our Equilibrium collection promotes balance & calm.
        </p>

        <div class="offer__box">
          <div class="price__box">
            <img src="images/icon-ethereum.svg" alt="icon-ethereum" />
            <span>0.041ETH</span>
          </div>
          <div class="timeleft__box">
            <img src="images/icon-clock.svg" alt="icon-clock" />
            <span>3 days left</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="author__box">
          <img
            src="images/image-avatar.png"
            alt="author-img"
            class="author--img"
          />
          <span
            >Creation of <span class="author--name">jules Wyvern</span></span
          >
        </div>
      </div>
      <!-- nft card ended here -->
    </main>
  </body>
</html>
