<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <title>Portfolio Table</title>
  </head>
  <body>
    <div class="card">
      <!-- card header -->
      <div class="card-header">
        <h1 class="card-heading">Portfolios of your peers</h1>
        <div class="filter">
          <span>Week</span>
          <span class="material-symbols-rounded icon--expand">
            expand_more
          </span>
        </div>
      </div>

      <!-- card search -->
      <div class="card-search">
        <input type="text" name="search" id="search" />
        <span class="material-symbols-rounded icon--search"> search </span>
        <label for="search">Serach by name or capital amount</label>
        <span class="material-symbols-rounded icon--funnel"> filter_alt </span>
      </div>

      <!-- card table -->
    </div>
  </body>
</html>
