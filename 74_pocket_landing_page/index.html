<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />

    <!-- stylesheets -->
    <link rel="stylesheet" href="stylesheets/base.css" />
    <link rel="stylesheet" href="stylesheets/header.css" />

    <title>Discover stories on Pocket</title>
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <header class="header">
        <!-- navbar -->
        <nav class="navbar">
          <div class="navbar-main">
            <img src="assets/logo.svg" alt="Pocket logo" class="header-logo" />
            <ul class="navigation-menu">
              <li><a href="#" class="navigation-link">Home</a></li>
              <li><a href="#" class="navigation-link">Saves</a></li>
              <li><a href="#" class="navigation-link active">Discover</a></li>
              <li><a href="#" class="navigation-link">Collections</a></li>
            </ul>
            <div class="signuplogin-box">
              <a class="header-btn login-btn">Log in</a>
              <button class="header-btn signup-btn">Sign up</button>
            </div>
            <!-- for smaller devices -->
            <div class="mobile-icons-box">
              <img
                src="assets/account.svg"
                alt="account"
                class="icon--account"
              />
              <img src="assets/menu.svg" alt="menu" class="icon--menu" />
            </div>
          </div>
        </nav>

        <section class="interest-section">
          <div>
            <div class="interest-section-left">
              <h1 class="interest-heading">
                Build a home for everything that interests you
              </h1>
              <p class="interest-paragraph">
                Add the
                <span>
                  <img
                    src="assets/savetopocket_black.svg"
                    alt="save to pocket"
                    class="icon-savetopocket--black"
                  />
                </span>
                button to your browser to collect articles, videos, and links
                from across the web. Use our app to enjoy them on any device in
                a distraction-free environment.
              </p>
              <a class="interest-signup-btn" href="#">Sign up</a>
            </div>
            <div class="interest-section-right">
              <img src="assets/interest-laptop-mylist.png" alt="laptop Image, in which screen contain pocket website" class="interest-laptop-image">
            </div>
          </div>
        </section>
      </header>

      <!-- Discover section -->
    </div>
  </body>
</html>
