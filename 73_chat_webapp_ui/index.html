<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="stylesheets/base.css" />
    <link rel="stylesheet" href="stylesheets/navbar.css" />
    <link rel="stylesheet" href="stylesheets/chat.css" />
    <title>Chat Webapp UI</title>
  </head>
  <body>
    <main>
      <nav>
        <div class="profile-picture"></div>
        <ul class="navigation-items-box">
          <div class="navigation-item">
            <span class="material-symbols-rounded navigation-icon--chat">
              forum
            </span>
            <span class="navigation-icon-name">All chats</span>
          </div>

          <div class="navigation-item selected-navigation-item">
            <span class="material-symbols-rounded navigation-icon--folder">
              folder
            </span>
            <span class="navigation-icon-name">Work</span>
          </div>

          <div class="navigation-item">
            <span class="material-symbols-rounded navigation-icon--folder">
              folder
            </span>
            <span class="navigation-icon-name">Meet</span>
          </div>

          <div class="navigation-seprator"></div>

          <div class="navigation-item">
            <span class="material-symbols-rounded navigation-icon--calender">
              calendar_month
            </span>
            <span class="navigation-icon-name">Calender</span>
          </div>

          <div class="navigation-item">
            <span class="material-symbols-rounded navigation-icon--analytics">
              analytics
            </span>
            <span class="navigation-icon-name">Analytics</span>
          </div>

          <div class="navigation-item">
            <span class="material-symbols-rounded navigation-icon--bookmark">
              Bookmarks
            </span>
            <span class="navigation-icon-name">Saved</span>
          </div>
        </ul>

        <div class="navigation-item navigation-item--setting">
          <span class="material-symbols-rounded navigation-icon--bookmark">
            Settings
          </span>
          <span class="navigation-icon-name">Settings</span>
        </div>
      </nav>
      <section class="chat-section"></section>
    </main>
  </body>
</html>
